<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d47a1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#08234d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="trunkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5d8aa8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a6b8a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="10" y="10" width="180" height="180" rx="24" fill="url(#bgGrad)" />

  <!-- Grid lines at the base (subtle) -->
  <line x1="40" y1="155" x2="160" y2="155" stroke="#1565c0" stroke-width="1.5" opacity="0.4"/>
  <line x1="40" y1="170" x2="160" y2="170" stroke="#1565c0" stroke-width="1.5" opacity="0.3"/>
  <line x1="70" y1="145" x2="70" y2="180" stroke="#1565c0" stroke-width="1.5" opacity="0.3"/>
  <line x1="100" y1="145" x2="100" y2="180" stroke="#1565c0" stroke-width="1.5" opacity="0.3"/>
  <line x1="130" y1="145" x2="130" y2="180" stroke="#1565c0" stroke-width="1.5" opacity="0.3"/>

  <!-- Left tree trunk (first G) -->
  <rect x="58" y="95" width="12" height="60" rx="3" fill="url(#trunkGrad)"/>
  <!-- Left canopy -->
  <ellipse cx="72" cy="72" rx="32" ry="36" fill="url(#leafGrad)" opacity="0.9"/>
  <ellipse cx="60" cy="80" rx="22" ry="26" fill="#43a047" opacity="0.7"/>

  <!-- Right tree trunk (second G) -->
  <rect x="128" y="95" width="12" height="60" rx="3" fill="url(#trunkGrad)"/>
  <!-- Right canopy -->
  <ellipse cx="126" cy="72" rx="32" ry="36" fill="url(#leafGrad)" opacity="0.9"/>
  <ellipse cx="138" cy="80" rx="22" ry="26" fill="#43a047" opacity="0.7"/>

  <!-- Shared canopy bridge connecting the two trees -->
  <ellipse cx="100" cy="58" rx="22" ry="18" fill="#388e3c" opacity="0.6"/>

  <!-- Letter G on left tree -->
  <text x="64" y="135" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="28" fill="#ffffff" text-anchor="middle" opacity="0.95">G</text>

  <!-- Letter G on right tree -->
  <text x="134" y="135" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="28" fill="#ffffff" text-anchor="middle" opacity="0.95">G</text>

  <!-- Small highlight leaves -->
  <circle cx="55" cy="55" r="4" fill="#66bb6a" opacity="0.8"/>
  <circle cx="85" cy="48" r="3.5" fill="#81c784" opacity="0.7"/>
  <circle cx="115" cy="48" r="3.5" fill="#81c784" opacity="0.7"/>
  <circle cx="145" cy="55" r="4" fill="#66bb6a" opacity="0.8"/>
  <circle cx="100" cy="44" r="3" fill="#a5d6a7" opacity="0.6"/>
</svg>
