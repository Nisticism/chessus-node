<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d47a1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#08234d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stemGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#2e7d32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4caf50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="10" y="10" width="180" height="180" rx="24" fill="url(#bgGrad2)" />

  <!-- 2x2 Grid squares at the base -->
  <rect x="38" y="128" width="28" height="28" rx="3" fill="url(#gridGrad)" stroke="#1a237e" stroke-width="1.5" opacity="0.7"/>
  <rect x="70" y="128" width="28" height="28" rx="3" fill="url(#gridGrad)" stroke="#1a237e" stroke-width="1.5" opacity="0.8"/>
  <rect x="102" y="128" width="28" height="28" rx="3" fill="url(#gridGrad)" stroke="#1a237e" stroke-width="1.5" opacity="0.7"/>
  <rect x="134" y="128" width="28" height="28" rx="3" fill="url(#gridGrad)" stroke="#1a237e" stroke-width="1.5" opacity="0.6"/>
  <rect x="38" y="160" width="28" height="18" rx="3" fill="url(#gridGrad)" stroke="#1a237e" stroke-width="1.5" opacity="0.5"/>
  <rect x="70" y="160" width="28" height="18" rx="3" fill="url(#gridGrad)" stroke="#1a237e" stroke-width="1.5" opacity="0.6"/>
  <rect x="102" y="160" width="28" height="18" rx="3" fill="url(#gridGrad)" stroke="#1a237e" stroke-width="1.5" opacity="0.5"/>
  <rect x="134" y="160" width="28" height="18" rx="3" fill="url(#gridGrad)" stroke="#1a237e" stroke-width="1.5" opacity="0.4"/>

  <!-- Main stem growing from the grid -->
  <path d="M100 128 Q100 100 100 75" stroke="url(#stemGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Left branch -->
  <path d="M100 95 Q85 85 72 78" stroke="#4caf50" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Right branch -->
  <path d="M100 95 Q115 85 128 78" stroke="#4caf50" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Leaves (cluster at top) -->
  <ellipse cx="100" cy="58" rx="20" ry="22" fill="#43a047" opacity="0.9"/>
  <ellipse cx="80" cy="68" rx="16" ry="18" fill="#4caf50" opacity="0.85"/>
  <ellipse cx="120" cy="68" rx="16" ry="18" fill="#4caf50" opacity="0.85"/>
  <ellipse cx="68" cy="75" rx="12" ry="13" fill="#66bb6a" opacity="0.7"/>
  <ellipse cx="132" cy="75" rx="12" ry="13" fill="#66bb6a" opacity="0.7"/>
  <ellipse cx="100" cy="46" rx="14" ry="14" fill="#388e3c" opacity="0.8"/>

  <!-- Small sprout on the left grid square -->
  <path d="M55 128 Q55 120 50 115" stroke="#66bb6a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="48" cy="113" rx="5" ry="4" fill="#81c784" opacity="0.8"/>

  <!-- Small sprout on the right grid square -->
  <path d="M147 128 Q147 120 152 115" stroke="#66bb6a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="154" cy="113" rx="5" ry="4" fill="#81c784" opacity="0.8"/>

  <!-- GG text at the bottom within the grid -->
  <text x="68" y="150" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="22" fill="#ffffff" text-anchor="middle" opacity="0.9">G</text>
  <text x="132" y="150" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="22" fill="#ffffff" text-anchor="middle" opacity="0.9">G</text>
</svg>
